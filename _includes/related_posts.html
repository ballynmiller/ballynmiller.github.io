{% if site.related_posts != empty %}
	<div>
		<span class="title underline">Related Post</span>
	</div>
	{% for post in site.related_posts %}
		<div class='related-post'>
			<a class="subtitle" href="{{post.url}}">{{post.title}}</a>
			<p>
				{{ post.excerpt | strip_html | truncatewords: 20 }}
				<a class="read" href="{{post.url}}">Read More</a>
			</p>
		</div>
	{% endfor %}
{% endif %}
