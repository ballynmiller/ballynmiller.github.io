<div id="pagination">
	<a
		href=
			{% if paginator.previous_page == 1 %}
				"/"
			{% else %}
				"/page/{{paginator.previous_page}}"
			{% endif %}
		{% if paginator.previous_page %}
		{% else %}
			class="disabled"
		{% endif %}
	>previous</a>
	<span id="pagination-page">{{paginator.page}}</span>
	<a href="/page/{{paginator.next_page}}"
		{% if paginator.next_page %}
		{% else %}
			class="disabled"
		{% endif %}
	>next</a>
</div>
