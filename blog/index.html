---

layout: default

---
{% include header.html blog=true %}
<div id="content">
	<div class="pure-u-4-5" id="recent_blogs">
		{% for post in site.posts %}
			<div class="post">
				<a class="title" href="{{post.url}}">{{post.title}}</a>
				<div class="subtitle">{{post.date | date_to_string }}</div>
				<p>{{post.excerpt}}</p>
				<a href="{{post.url}}">Read More</a>
			</div>
		{% endfor %}
	</div>
	<!-- TODO: add categories? -->
</div>
